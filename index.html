<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadgene 團隊共用名片簿</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .material-icons { vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex h-screen items-center justify-center bg-slate-50">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-indigo-600 mx-auto mb-4"></div>
                <p class="text-slate-400 font-bold">系統啟動中，請稍候...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (已移除 Storage 模組，不需要綁信用卡了) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = {
          apiKey: "AIzaSyCUtA1xlHf8-tW7gNheA1on7oOrRWPaDBY",
          authDomain: "business-card-manager-a68c8.firebaseapp.com",
          projectId: "business-card-manager-a68c8",
          storageBucket: "business-card-manager-a68c8.firebasestorage.app",
          messagingSenderId: "501258821389",
          appId: "1:501258821389:web:599a9abaa68dbe189f9a44",
          measurementId: "G-5YEL14QEVX"
        };

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
        } catch (e) {
            console.error("Firebase 初始化錯誤:", e);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ALLOWED_DOMAINS = ["leadgene.com.tw"];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [cards, setCards] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', title: '', company: '', phone: '', email: '', note: '', imageUrl: '' });
            const [editingId, setEditingId] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        const domain = u.email ? u.email.split('@')[1] : "";
                        if (ALLOWED_DOMAINS.includes(domain)) {
                            setUser(u);
                        } else {
                            alert("非授權網域，請更換公司帳號登入");
                            auth.signOut();
                        }
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection('artifacts').doc('business-card-manager').collection('public').doc('data').collection('cards')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snap => {
                        const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setCards(list);
                    }, (err) => {
                        console.error("Firestore 讀取錯誤:", err);
                    });
                return () => unsubscribe();
            }, [user]);

            // --- 圖片壓縮轉碼處理 (替代 Firebase Storage 方案) ---
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 檢查是否為圖片
                if (!file.type.startsWith('image/')) {
                    alert('請上傳圖片格式檔案');
                    return;
                }

                setUploading(true); // 顯示處理中

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        // 建立 Canvas 來進行圖片壓縮
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; // 限制最大寬度以縮小檔案體積
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height *= MAX_WIDTH / width));
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 壓縮成 JPEG，品質設定為 0.7 (70%)
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        
                        // 直接將壓縮後的 Base64 文字存入 formData
                        setFormData(prev => ({ ...prev, imageUrl: compressedBase64 }));
                        setUploading(false);
                    };
                };
                reader.readAsDataURL(file);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                setUploading(true);

                try {
                    const ref = db.collection('artifacts').doc('business-card-manager').collection('public').doc('data').collection('cards');
                    const payload = { 
                        ...formData, 
                        updatedAt: Date.now() 
                    };

                    // Firestore 文件大小限制為 1MB，壓縮後通常只有幾十 KB，可以安全直接存入
                    if (editingId) {
                        await ref.doc(editingId).update({ ...payload, lastUpdatedBy: user.email });
                    } else {
                        await ref.add({ ...payload, createdAt: Date.now(), createdBy: user.email });
                    }
                    closeModal();
                } catch (error) {
                    console.error("儲存失敗:", error);
                    alert(`儲存失敗！錯誤碼: ${error.code}\n可能原因：圖片壓縮後仍然太大，或 Firestore 規則未正確設定。`);
                } finally {
                    setUploading(false);
                }
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingId(null);
                setFormData({ name: '', title: '', company: '', phone: '', email: '', note: '', imageUrl: '' });
            };

            const openEditModal = (card) => {
                setEditingId(card.id);
                setFormData({ 
                    name: card.name || '', 
                    title: card.title || '', 
                    company: card.company || '', 
                    phone: card.phone || '', 
                    email: card.email || '', 
                    note: card.note || '', 
                    imageUrl: card.imageUrl || '' 
                });
                setIsModalOpen(true);
            };

            if (loading) return <div className="flex h-screen items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-indigo-600"></div></div>;

            if (!user) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-100 p-4 text-center">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl max-w-sm w-full">
                            <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-8 shadow-xl rotate-3">
                                <span className="material-icons text-[40px]">group</span>
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 mb-2">Team Cards</h1>
                            <p className="text-slate-400 text-sm mb-10 font-bold">共享數位名片資料庫</p>
                            <button onClick={() => auth.signInWithPopup(provider)} className="w-full py-4 border-2 border-slate-100 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 active:scale-95 transition-all text-slate-700">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="Google"/>
                                使用 Google 帳號登入
                            </button>
                        </div>
                    </div>
                );
            }

            const filteredCards = cards.filter(c => {
                const searchLower = (searchTerm || '').toLowerCase();
                const nameMatch = (c.name || '').toLowerCase().includes(searchLower);
                const companyMatch = (c.company || '').toLowerCase().includes(searchLower);
                return nameMatch || companyMatch;
            });

            return (
                <div className="min-h-screen">
                    <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b h-20 flex items-center px-8 justify-between z-40 text-slate-800">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                <span className="material-icons text-[24px]">contact_page</span>
                            </div>
                            <span className="font-black text-xl tracking-tight">Leadgene Shared</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsModalOpen(true)} className="bg-slate-900 text-white px-6 py-2.5 rounded-2xl text-sm font-bold shadow-xl active:scale-95 transition-all hover:bg-indigo-600">新增名片</button>
                            <button onClick={() => auth.signOut()} className="text-slate-300 hover:text-red-500 transition-colors">
                                <span className="material-icons text-[24px]">logout</span>
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-8">
                        <div className="relative mb-12 max-w-2xl mx-auto">
                            <span className="material-icons absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-[24px]">search</span>
                            <input 
                                type="text" placeholder="搜尋團隊共用名片..." 
                                className="w-full pl-14 pr-6 py-4 rounded-3xl bg-white border-none shadow-xl focus:ring-4 focus:ring-indigo-500/10 outline-none text-lg font-medium"
                                value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                            />
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {filteredCards.map(card => (
                                <div key={card.id} className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-2xl transition-all group overflow-hidden flex flex-col">
                                    <div className="w-full h-56 bg-slate-100 relative flex items-center justify-center border-b border-slate-100 overflow-hidden">
                                        {card.imageUrl ? (
                                            <img src={card.imageUrl} className="w-full h-full object-contain p-4 group-hover:scale-105 transition-transform duration-500 drop-shadow-md" alt={card.name} />
                                        ) : (
                                            <div className="text-slate-300"><span className="material-icons text-[48px]">image</span></div>
                                        )}
                                        <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
                                            <button onClick={() => openEditModal(card)} className="p-2.5 bg-white/90 backdrop-blur-md text-indigo-600 rounded-xl shadow-lg hover:bg-indigo-600 hover:text-white transition-all">
                                                <span className="material-icons text-[18px]">edit</span>
                                            </button>
                                            <button onClick={() => { if(confirm('確定刪除？')) db.collection('artifacts').doc('business-card-manager').collection('public').doc('data').collection('cards').doc(card.id).delete() }} className="p-2.5 bg-white/90 backdrop-blur-md text-red-500 rounded-xl shadow-lg hover:bg-red-500 hover:text-white transition-all">
                                                <span className="material-icons text-[18px]">delete</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="p-8">
                                        <div className="flex items-center gap-4 mb-4">
                                            <div className="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 font-black text-xl flex-shrink-0">{card.name?.[0] || '?'}</div>
                                            <div className="min-w-0">
                                                <h3 className="font-black text-slate-800 text-lg truncate">{card.name || '未命名'}</h3>
                                                <p className="text-xs text-indigo-600 font-bold uppercase truncate">{card.title || 'Personal'}</p>
                                            </div>
                                        </div>
                                        <div className="space-y-3 text-sm text-slate-500 font-medium">
                                            <div className="flex items-center gap-3"><span className="material-icons text-[18px] text-slate-300">business</span><span className="truncate">{card.company || '—'}</span></div>
                                            {card.phone && <div className="flex items-center gap-3"><span className="material-icons text-[18px] text-slate-300">phone</span>{card.phone}</div>}
                                            {card.email && <div className="flex items-center gap-3"><span className="material-icons text-[18px] text-slate-300">email</span><span className="truncate">{card.email}</span></div>}
                                        </div>
                                        <div className="mt-6 pt-4 border-t border-slate-50 text-[10px] text-slate-300 font-bold flex justify-between uppercase tracking-tighter">
                                            <span>Author: {card.createdBy?.split('@')[0]}</span>
                                            <span>{card.createdAt ? new Date(card.createdAt).toLocaleDateString() : ''}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md overflow-y-auto">
                            <div className="bg-white w-full max-w-lg rounded-[3.5rem] p-10 shadow-2xl my-auto animate-in zoom-in duration-300">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black text-slate-800">{editingId ? '修改名片' : '新增共用名片'}</h3>
                                    <button onClick={closeModal} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 transition-colors">
                                        <span className="material-icons text-[24px]">close</span>
                                    </button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">名片照片 (自動壓縮)</label>
                                        <div onClick={() => fileInputRef.current.click()} className="w-full h-48 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-100 transition-all overflow-hidden relative group">
                                            {uploading && formData.imageUrl === '' ? (
                                                <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-indigo-600"></div>
                                            ) : formData.imageUrl ? (
                                                <img src={formData.imageUrl} className="w-full h-full object-contain p-2" />
                                            ) : (
                                                <>
                                                    <span className="material-icons text-[32px] text-slate-300 mb-2">photo_camera</span>
                                                    <span className="text-xs text-slate-400 font-bold">點擊選擇照片 (自動壓縮轉存)</span>
                                                </>
                                            )}
                                        </div>
                                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageChange} />
                                    </div>
                                    <input required placeholder="姓名 *" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 text-slate-700 font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-5">
                                        <input placeholder="職位" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        <input placeholder="公司" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <input placeholder="電話" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                        <input type="email" placeholder="Email" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    </div>
                                    <textarea placeholder="備註" rows="2" className="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-500/10 font-bold" value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} />
                                    <div className="pt-6 flex gap-4">
                                        <button type="button" onClick={closeModal} className="flex-1 py-4 text-slate-400 font-bold" disabled={uploading}>取消</button>
                                        <button type="submit" className="flex-[2] py-4 bg-indigo-600 text-white rounded-[1.5rem] font-bold shadow-lg flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all" disabled={uploading}>
                                            {uploading ? (
                                                <>
                                                    <div className="animate-spin h-4 w-4 border-2 border-white/20 border-t-white rounded-full"></div>
                                                    <span>處理中...</span>
                                                </>
                                            ) : "儲存共享"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
